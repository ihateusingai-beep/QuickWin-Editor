<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>QuickWin Editor • SEN</title>
<style>
  body { margin:0; font-family: system-ui, sans-serif; background:#f8f9fa; color:#222; }
  .top { background:#fff; padding:12px 20px; border-bottom:3px solid #ddd; display:flex; align-items:center; gap:12px; }
  .step { font-size:18px; font-weight:600; }
  .step.active { color:#e11d48; }
  .main { display:flex; height:calc(100vh - 140px); }
  .editor, .preview { flex:1; padding:16px; }
  .editor { background:#fff; border-right:3px solid #ddd; }
  textarea { width:100%; height:100%; font-size:18px; line-height:1.5; border:2px solid #ccc; border-radius:8px; padding:12px; resize:none; }
  .preview iframe { width:100%; height:100%; border:3px solid #ddd; border-radius:8px; background:#fff; }
  .bottom { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:4px solid #000; padding:16px; display:flex; gap:16px; justify-content:center; }
  button { font-size:22px; padding:14px 32px; border-radius:9999px; border:3px solid #000; background:#fff; cursor:pointer; }
  button.primary { background:#e11d48; color:#fff; border-color:#e11d48; box-shadow:0 0 0 6px #ffe4e9; }
  .badge { position:absolute; top:-10px; right:-10px; background:#ffd700; color:#000; font-weight:900; padding:4px 14px; border-radius:9999px; font-size:14px; display:none; }
  .slider { display:flex; align-items:center; gap:8px; font-size:14px; }
</style>
</head>
<body>
<div class="top">
  <div class="step">1️⃣ 拿積木 ✅</div>
  <div class="step active">2️⃣ 變魔法 ✨</div>
  <div class="step">3️⃣ 帶回家</div>
</div>

<div class="main">
  <div class="editor">
    <div style="margin-bottom:8px;font-weight:600">📝 編輯區（把 red 改成你鍾意嘅顏色）</div>
    <textarea id="code" spellcheck="false">&lt;h1 style="color:red"&gt;Hello&lt;/h1&gt;</textarea>
  </div>
  <div class="preview">
    <div style="margin-bottom:8px;font-weight:600;display:flex;justify-content:space-between;align-items:center;">
      📺 即時預覽
      <button onclick="togglePreviewFullscreen()" style="font-size:14px;padding:4px 10px;border-radius:6px;">⛶ 全螢幕</button>
    </div>
    <iframe id="preview"></iframe>
  </div>
</div>

<div class="bottom">
  <div class="slider">
    <span>字體</span>
    <input type="range" id="fontSize" min="14" max="32" value="18">
    <span id="fontVal">18px</span>
  </div>
  <button onclick="clearCode()">🗑️ 清空</button>
  <button onclick="undo()">↩️ 復原</button>
  <button class="primary" onclick="download()">💾 下載 (Ctrl+S)</button>
  <button onclick="toggleSound()">🔊</button>
  <button onclick="toggleContrast()">🌓</button>
  <div id="badge" class="badge">🏅 金牌</div>
</div>

<script>
// Live preview
const codeEl = document.getElementById('code');
const preview = document.getElementById('preview');
const badge = document.getElementById('badge');
let history = [];
let soundOn = true;
let contrastOn = false;

function updatePreview() {
  const html = codeEl.value;
  preview.srcdoc = `<!DOCTYPE html><html><body style="margin:40px;font-family:sans-serif;font-size:2em">${html}</body></html>`;
  
  // Auto badge trigger (robust color detection)
  if (/color\s*:\s*(blue|green|purple|orange|pink)/i.test(html)) {
    badge.style.display = 'block';
    if (soundOn) new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=').play().catch(()=>{});
  }
}

codeEl.addEventListener('input', () => {
  history.push(codeEl.value);
  if (history.length > 10) history.shift();
  updatePreview();
});

// Font size slider (SEN)
const fontSlider = document.getElementById('fontSize');
const fontVal = document.getElementById('fontVal');
fontSlider.oninput = () => {
  codeEl.style.fontSize = fontSlider.value + 'px';
  fontVal.textContent = fontSlider.value + 'px';
};

// Buttons
function clearCode() {
  history.push(codeEl.value);
  codeEl.value = '';
  updatePreview();
}
function undo() {
  if (history.length) {
    codeEl.value = history.pop();
    updatePreview();
  }
}
function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:8px 20px;border-radius:9999px;font-size:15px;';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1400);
}
function download() {
  const blob = new Blob([codeEl.value], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'my-magic.html';
  a.click();
  if (soundOn) showToast('叮！已保存 🏅');
}
function toggleSound() {
  soundOn = !soundOn;
  showToast(soundOn ? '音效開啟' : '靜音模式');
}
function toggleContrast() {
  contrastOn = !contrastOn;
  document.body.style.filter = contrastOn ? 'contrast(1.4) saturate(1.3)' : '';
  showToast(contrastOn ? '高對比模式' : '正常模式');
}
function togglePreviewFullscreen() {
  if (!document.fullscreenElement) {
    preview.requestFullscreen().catch(() => {
      // fallback: expand iframe
      preview.style.position = 'fixed';
      preview.style.top = '0';
      preview.style.left = '0';
      preview.style.width = '100vw';
      preview.style.height = '100vh';
      preview.style.zIndex = '9999';
    });
  } else {
    document.exitFullscreen();
  }
}

// Keyboard sync (Ctrl+S)
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    download();
  }
});

// Init
codeEl.value = '<h1 style="color:red">Hello</h1>';
updatePreview();
setTimeout(() => {
  // Highlight hint for SEN
  codeEl.style.background = '#fffbeb';
}, 800);
</script>
</body>
</html>
